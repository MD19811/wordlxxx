<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordl XXX</title>
    <style>
    .shake {
	    animation: shake 0.5s;
}
        @keyframes shake {
		    0% { transform: translateX(0); }
		    25% { transform: translateX(-5px); }
		    50% { transform: translateX(5px); }
		    75% { transform: translateX(-5px); }
		    100% { transform: translateX(0); }
}
/* De animatie definitie */
@keyframes flip {
    0% { transform: rotateX(0); }
    45% { transform: rotateX(90deg); }
    55% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
}

.flip {
    animation: flip 0.6s ease-in-out;
}

/* Zorg dat de transitie van kleuren soepel verloopt tijdens de flip */
.tile {
    transition: background-color 0.3s, border-color 0.3s;
}



        :root {
            --correct: #6aaa64;
            --present: #c9b458;
            --absent: #3a3a3c;
            --bg: #121213;
            --key-bg: #818384;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .main-game-area {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls { margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        select, button { padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }

        #game-board { display: grid; gap: 5px; }
        .tile {
            width: 50px; height: 50px; border: 2px solid #3a3a3c;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; text-transform: uppercase;
        }

        .image-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .reveal-container {
            width: 320px; height: 320px; border-radius: 12px;
            overflow: hidden; border: 3px solid #3a3a3c; background: #000;
            position: relative;
        }
        #result-img {
            width: 100%; height: 100%; object-fit: contain;
            filter: blur(40px); transition: filter 0.8s ease;
        }
        #fs-btn {
            display: none; background: #fff; color: #000;
            padding: 12px 20px; border-radius: 8px; font-size: 14px;
            cursor: pointer; border: none; font-weight: bold;
        }

        #keyboard { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .key-row { display: flex; justify-content: center; gap: 4px; }
        .key {
            background-color: var(--key-bg); border-radius: 4px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; flex: 1; min-width: 25px;
        }
        .key.wide { flex: 2; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center;
        }
        #modal img { max-width: 95%; max-height: 95%; border-radius: 5px; }

        .correct { background-color: var(--correct) !important; border-color: var(--correct) !important; }
        .present { background-color: var(--present) !important; border-color: var(--present) !important; }
        .absent { background-color: var(--absent) !important; border-color: var(--absent) !important; opacity: 0.4; }
    </style>
</head>

      const azerty = [
          ["a","z","e","r","t","y","u","i","o","p"],
          ["q","s","d","f","g","h","j","k","l","m"],
          ["ENTER", "w", "x", "c", "v", "b", "n", "?"]
      ];

      let secretWord = "", currentGuess = "", guesses = [], gameOver = false;
      let foundLetters = new Set();

      function initGame() {
          const lang = document.getElementById('lang').value;
          const len = parseInt(document.getElementById('length').value);
          secretWord = wordList[lang][len][Math.floor(Math.random() * wordList[lang][len].length)].toLowerCase();

          currentGuess = ""; guesses = []; gameOver = false; foundLetters.clear();

          const board = document.getElementById('game-board');
          board.innerHTML = "";
          board.style.gridTemplateColumns = `repeat(${len}, 1fr)`;
          for (let i = 0; i < 6 * len; i++) {
              const tile = document.createElement('div');
              tile.className = 'tile'; tile.id = `tile-${i}`;
              board.appendChild(tile);
          }

          drawKeyboard();
          document.getElementById('result-img').src = getRandomImageUrl();
          document.getElementById('result-img').style.filter = "blur(40px)";
          document.getElementById('fs-btn').style.display = "none";
      }

      function drawKeyboard() {
          const kb = document.getElementById('keyboard');
          kb.innerHTML = "";
          azerty.forEach(row => {
              const rowDiv = document.createElement('div');
              rowDiv.className = 'key-row';
              row.forEach(key => {
                  const keyBtn = document.createElement('div');
                  keyBtn.className = 'key' + (key.length > 1 ? ' wide' : '');
                  keyBtn.innerText = key;
                  keyBtn.id = `key-${key.toLowerCase()}`;
                  keyBtn.onclick = () => handleInput(key);
                  rowDiv.appendChild(keyBtn);
              });
              kb.appendChild(rowDiv);
          });
      }

      function handleInput(key) {
          if (gameOver) return;
          const len = secretWord.length;
          if (key === "ENTER" || key === "Enter") {
              if (currentGuess.length === len) submitGuess();
          } else if (key === "?" || key === "Backspace") {
              currentGuess = currentGuess.slice(0, -1);
              updateDisplay();
          } else if (/^[a-zA-Z]$/.test(key) && currentGuess.length < len) {
              currentGuess += key.toLowerCase();
              updateDisplay();
          }
      }

      function updateDisplay() {
          const len = secretWord.length;
          const startIdx = guesses.length * len;
          for (let i = 0; i < len; i++) {
              document.getElementById(`tile-${startIdx + i}`).innerText = currentGuess[i] || "";
          }
      }

      async function submitGuess() {
	            const len = secretWord.length;
	            const guessToProcess = currentGuess;
	            const lang = document.getElementById('lang').value;
	            const startIdx = guesses.length * len;

	            // --- WOORD CONTROLE ---
	            let isValid = true;
	            if (lang === "en") {
	                try {
	                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${guessToProcess}`);
	                    if (!response.ok) isValid = false;
	                } catch (err) { isValid = true; }
	            } else {
	               // Controleer of het getypte woord in onze Nederlandse lijst staat
				           // We kijken in alle lengtes voor de zekerheid, zodat een geldig woord
				           // van de juiste lengte altijd gevonden wordt.

				               isValid = true;

 				   }

	            if (!isValid) {
	                for (let i = 0; i < len; i++) {
	                    const tile = document.getElementById(`tile-${startIdx + i}`);
	                    tile.classList.add('shake');
	                    setTimeout(() => tile.classList.remove('shake'), 500);
	                }
	                setTimeout(() => {
	                    alert("Invalid word!");
	                    currentGuess = "";
	                    updateDisplay();
	                }, 300);
	                return;
	            }

	            // --- KLEUREN EN FLIP ANIMATIE ---
	            const guessArr = guessToProcess.split("");

	            guessArr.forEach((char, i) => {
	                const tile = document.getElementById(`tile-${startIdx + i}`);
	                const key = document.getElementById(`key-${char}`);

	                // Pas de animatie toe met een vertraging per letter (100ms per tegel)
	                setTimeout(() => {
	                    tile.classList.add('flip');

	                    // Halverwege de animatie (300ms) veranderen we de kleur
	                    setTimeout(() => {
	                        if (char === secretWord[i]) {
	                            tile.classList.add('correct');
	                            key.classList.add('correct');
	                            foundLetters.add(char);
	                        } else if (secretWord.includes(char)) {
	                            tile.classList.add('present');
	                            if (!key.classList.contains('correct')) key.classList.add('present');
	                            foundLetters.add(char);
	                        } else {
	                            tile.classList.add('absent');
	                            if (!key.classList.contains('correct') && !key.classList.contains('present')) {
	                                key.classList.add('absent');
	                            }
	                        }

	                        // Update blur na elke onthulde letter voor een vloeiend effect
	                        let newBlur = Math.max(0, 40 - (foundLetters.size * 7));
	                        document.getElementById('result-img').style.filter = `blur(${newBlur}px)`;
	                    }, 300);

	                }, i * 150);
	            });

	            // Wacht tot alle animaties klaar zijn voordat we de game-state checken
	            setTimeout(() => {
	                if (guessToProcess === secretWord) {
	                    document.getElementById('result-img').style.filter = "blur(0px)";
	                    document.getElementById('fs-btn').style.display = "block";
	                    gameOver = true;
	                    // Een kleine vertraging voor de win-melding
	                    setTimeout(() => alert("Gefeliciteerd!"), 500);
	                } else {
	                    guesses.push(guessToProcess);
	                    currentGuess = "";
	                    if (guesses.length >= 6) {
	                        alert("Helaas! Het woord was: " + secretWord);
	                        gameOver = true;
	                    }
	                }
	            }, (len * 150) + 600);
      }
      function openModal() {
          const modal = document.getElementById('modal');
          document.getElementById('modal-img').src = document.getElementById('result-img').src;
          modal.style.display = "flex";
      }

      window.addEventListener('keydown', (e) => handleInput(e.key));
      initGame();
